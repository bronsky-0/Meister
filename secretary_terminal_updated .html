<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Терминал секретаря - Турнирное табло</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .secretary-terminal {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Верхняя половина - информация о бое */
        .upper-section {
            flex: 1;
            display: flex;
            position: relative;
        }

        .left-side {
            flex: 1;
            background: rgb(200, 0, 0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .right-side {
            flex: 1;
            background: rgb(0, 0, 200);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .fighter-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .main-score {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }

        .score-label {
            font-size: 20px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .rounds-score {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .rounds-label {
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Центральная информация */
        .center-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            z-index: 10;
        }

        .timer {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #000;
            background: #fff;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .timer.active {
            color: #000;
            background: rgb(0, 150, 0);
        }

        .timer-label {
            font-size: 20px;
            margin-bottom: 10px;
            color: #fff;
        }

        .round-info {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        /* Нижняя половина - панель управления */
        .control-section {
            flex: 1;
            background: #000;
            border-top: 2px solid #fff;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .control-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            flex: 1;
            align-items: start;
            max-height: calc(100% - 80px);
        }

        .control-button {
            background: rgb(128, 128, 128);
            border: 2px solid #fff;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            padding: 8px 4px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-wrap: break-word;
            line-height: 1.1;
        }

        .control-button:hover {
            background: rgb(150, 150, 150);
            transform: translateY(-2px);
        }

        .control-button:active {
            transform: translateY(0);
            background: rgb(100, 100, 100);
        }

        .control-button.red-action {
            border-color: rgb(200, 0, 0);
            box-shadow: 0 0 10px rgba(200, 0, 0, 0.3);
        }

        .control-button.blue-action {
            border-color: rgb(0, 0, 200);
            box-shadow: 0 0 10px rgba(0, 0, 200, 0.3);
        }

        .control-button.timer-action {
            border-color: rgb(0, 150, 0);
            box-shadow: 0 0 10px rgba(0, 150, 0, 0.3);
        }

        .control-button.special-action {
            border-color: rgb(255, 255, 0);
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.3);
        }

        .control-button.save-action {
            border-color: rgb(255, 165, 0);
            box-shadow: 0 0 10px rgba(255, 165, 0, 0.3);
        }

        /* Статусные индикаторы */
        .status-indicators {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
        }

        .status-indicator {
            color: rgb(255, 255, 0);
            font-weight: bold;
        }

        .status-indicator.green {
            color: rgb(0, 150, 0);
        }

        /* Окно настроек */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .settings-content {
            background: #333;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            color: #fff;
        }

        .settings-title {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .settings-field {
            margin-bottom: 20px;
        }

        .settings-label {
            display: block;
            margin-bottom: 5px;
            font-size: 16px;
            font-weight: bold;
        }

        .settings-input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #666;
            border-radius: 5px;
            background: #222;
            color: #fff;
        }

        .settings-input:focus {
            outline: none;
            border-color: #fff;
        }

        .settings-toggle {
            background: rgb(128, 128, 128);
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .settings-toggle.active {
            background: rgb(255, 255, 0);
            color: #000;
        }

        .settings-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .settings-button {
            background: rgb(128, 128, 128);
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .settings-button.primary {
            background: rgb(0, 150, 0);
        }

        .settings-button:hover {
            background: rgb(150, 150, 150);
        }

        .settings-button.primary:hover {
            background: rgb(0, 180, 0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .control-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .main-score {
                font-size: 60px;
            }

            .timer {
                font-size: 24px;
            }

            .control-button {
                font-size: 11px;
                padding: 6px 2px;
                min-height: 35px;
            }
            /* Плашка "Время вышло" */
            #timeUpOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            }

            .timeup-banner {
            background: rgb(180, 0, 0);
            border: 4px solid #fff;
            border-radius: 10px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255,0,0,0.7);
            }

            .timeup-title {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            }

            .timeup-button {
            background: #fff;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            }

            .timeup-button:hover {
            background: #ffd1d1;
            transform: translateY(-1px);
            }

            .timeup-button:active {
            transform: translateY(0);
            background: #f0b3b3
        }
    </style>
</head>
<body>
    <div class="secretary-terminal">
        <!-- Верхняя половина - информация о бое -->
        <div class="upper-section">
            <div class="left-side" id="leftSide">
                <div class="fighter-name" id="leftFighterName">Красный боец</div>
                <div class="main-score" id="leftScore">0</div>
                <div class="score-label">Счет</div>
                <div class="rounds-score" id="leftRounds">0</div>
                <div class="rounds-label">Раунды</div>
            </div>

            <div class="right-side" id="rightSide">
                <div class="fighter-name" id="rightFighterName">Синий боец</div>
                <div class="main-score" id="rightScore">0</div>
                <div class="score-label">Счет</div>
                <div class="rounds-score" id="rightRounds">0</div>
                <div class="rounds-label">Раунды</div>
            </div>

            <!-- Центральная информация -->
            <div class="center-info">
                <div class="timer" id="timer">02:00</div>
                <div class="timer-label">Время</div>
                <div class="round-info" id="roundInfo">Раунд 1</div>
            </div>
        </div>

        <!-- Нижняя половина - панель управления -->
        <div class="control-section">
            <div class="control-title">ПАНЕЛЬ УПРАВЛЕНИЯ</div>

            <div class="control-grid">
                <button class="control-button red-action" onclick="addScore('red')">+1 балл красному</button>
                <button class="control-button timer-action" id="timerToggle" onclick="toggleTimer()">Старт</button>
                <button class="control-button timer-action" onclick="resetTimer()">Сброс таймера</button>
                <button class="control-button blue-action" onclick="addScore('blue')">+1 балл синему</button>

                <button class="control-button red-action" onclick="removeScore('red')">-1 балл красному</button>
                <button class="control-button special-action" onclick="endRound()">Завершить раунд</button>
                <button class="control-button special-action" onclick="switchSides()">Переключить стороны</button>
                <button class="control-button blue-action" onclick="removeScore('blue')">-1 балл синему</button>

                <button class="control-button red-action" onclick="removeRound('red')">-1 раунд красному</button>
                <button class="control-button save-action" onclick="saveResults()">Сохранить результаты</button>
                <button class="control-button" onclick="toggleFullscreen()">На весь экран</button>
                <button class="control-button blue-action" onclick="removeRound('blue')">-1 раунд синему</button>

                <button class="control-button" onclick="openSettings()">Настройки</button>
                <button class="control-button" onclick="fullReset()">Полный сброс</button>
                <button class="control-button" onclick="openHelp()">Справка</button>
                <button class="control-button" onclick="downloadResults()">Скачать результаты</button>
            </div>

            <!-- Статусные индикаторы -->
            <div class="status-indicators">
                <div class="status-indicator" id="tournamentStatus"></div>
                <div class="status-indicator" id="switchStatus"></div>
                <div class="status-indicator green" id="displayStatus"></div>
            </div>
        </div>
    </div>

    <!-- Окно настроек -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-content">
            <div class="settings-title">Настройки боя</div>

            <div class="settings-field">
                <label class="settings-label">Красный боец:</label>
                <input type="text" class="settings-input" id="redFighterInput" maxlength="25" placeholder="Красный боец">
            </div>

            <div class="settings-field">
                <label class="settings-label">Синий боец:</label>
                <input type="text" class="settings-input" id="blueFighterInput" maxlength="25" placeholder="Синий боец">
            </div>

            <div class="settings-field">
                <label class="settings-label">Время раунда (секунды):</label>
                <input type="number" class="settings-input" id="timerDurationInput" min="5" max="300" placeholder="120">
            </div>

            <div class="settings-field">
                <label class="settings-label">Режим Валлерштайн:</label>
                <button class="settings-toggle" id="wallersteinToggle" onclick="toggleWallerstein()">ВКЛ</button>
            </div>

            <div class="settings-field">
                <label class="settings-label">Режим турнира:</label>
                <button class="settings-toggle" id="tournamentToggle" onclick="toggleTournament()">ВЫКЛ</button>
            </div>

            <div class="settings-field">
                <label class="settings-label">Экран со счетом:</label>
                <button class="settings-toggle" id="displayToggle" onclick="toggleDisplayScreen()">ВЫКЛ</button>
            </div>

            <div class="settings-buttons">
                <button class="settings-button" onclick="closeSettings(false)">Отмена</button>
                <button class="settings-button primary" onclick="closeSettings(true)">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // Состояние игры
        var gameState = {
            timerDuration: 120,
            wallersteinMode: true,
            tournamentMode: false,
            displayScreenEnabled: false,
            sidesSwitched: false,

            redScore: 0,
            blueScore: 0,
            redRoundsWon: 0,
            blueRoundsWon: 0,
            currentRound: 1,

            redFighterName: "Красный боец",
            blueFighterName: "Синий боец",

            timerActive: false,
            timerStartTime: 0,
            timerRemaining: 120,

            displayWindow: null,

            // История боев для сохранения
            fightHistory: []
        };

        // История всех боев (загружается из localStorage)
        var allFights = JSON.parse(localStorage.getItem('tournamentResults') || '[]');

        // Функции отображения
        function getDisplayData() {
            if (gameState.sidesSwitched) {
                return {
                    leftName: gameState.blueFighterName,
                    leftScore: gameState.blueScore,
                    leftRounds: gameState.blueRoundsWon,
                    leftColor: 'rgb(0, 0, 200)',
                    rightName: gameState.redFighterName,
                    rightScore: gameState.redScore,
                    rightRounds: gameState.redRoundsWon,
                    rightColor: 'rgb(200, 0, 0)'
                };
            }
            return {
                leftName: gameState.redFighterName,
                leftScore: gameState.redScore,
                leftRounds: gameState.redRoundsWon,
                leftColor: 'rgb(200, 0, 0)',
                rightName: gameState.blueFighterName,
                rightScore: gameState.blueScore,
                rightRounds: gameState.blueRoundsWon,
                rightColor: 'rgb(0, 0, 200)'
            };
        }

        function formatTime(seconds) {
            var minutes = Math.floor(seconds / 60);
            var secs = seconds % 60;
            return minutes.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
        }

        function updateDisplay() {
            var data = getDisplayData();

            // Обновляем цвета сторон
            document.getElementById('leftSide').style.background = data.leftColor;
            document.getElementById('rightSide').style.background = data.rightColor;

            // Обновляем имена и счет
            document.getElementById('leftFighterName').textContent = data.leftName;
            document.getElementById('rightFighterName').textContent = data.rightName;
            document.getElementById('leftScore').textContent = data.leftScore;
            document.getElementById('rightScore').textContent = data.rightScore;

            // Обновляем раунды
            var leftRoundsEl = document.getElementById('leftRounds');
            var rightRoundsEl = document.getElementById('rightRounds');
            var roundsLabels = document.querySelectorAll('.rounds-label');
            var roundsScores = document.querySelectorAll('.rounds-score');

            if (gameState.wallersteinMode) {
                leftRoundsEl.textContent = data.leftRounds;
                rightRoundsEl.textContent = data.rightRounds;
                for (var i = 0; i < roundsLabels.length; i++) {
                    roundsLabels[i].style.display = 'block';
                }
                for (var i = 0; i < roundsScores.length; i++) {
                    roundsScores[i].style.display = 'block';
                }
                document.getElementById('roundInfo').textContent = 'Раунд ' + gameState.currentRound;
            } else {
                for (var i = 0; i < roundsLabels.length; i++) {
                    roundsLabels[i].style.display = 'none';
                }
                for (var i = 0; i < roundsScores.length; i++) {
                    roundsScores[i].style.display = 'none';
                }
                document.getElementById('roundInfo').textContent = '';
            }

            // Обновляем таймер
            document.getElementById('timer').textContent = formatTime(gameState.timerRemaining);
            document.getElementById('timer').className = gameState.timerActive ? 'timer active' : 'timer';

            // Обновляем кнопку таймера
            document.getElementById('timerToggle').textContent = gameState.timerActive ? 'Пауза' : 'Старт';

            // Обновляем статусные индикаторы
            document.getElementById('tournamentStatus').textContent = gameState.tournamentMode ? 'РЕЖИМ ТУРНИРА' : '';
            document.getElementById('switchStatus').textContent = gameState.sidesSwitched ? 'СТОРОНЫ ПЕРЕКЛЮЧЕНЫ' : '';
            document.getElementById('displayStatus').textContent = gameState.displayScreenEnabled ? 'ЭКРАН СО СЧЕТОМ ВКЛЮЧЕН' : '';

            // Обновляем экран со счетом если открыт
            updateDisplayScreen();
        }

        function updateDisplayScreen() {
            if (gameState.displayWindow && !gameState.displayWindow.closed) {
                try {
                    gameState.displayWindow.postMessage({
                        type: 'gameStateUpdate',
                        gameState: {
                            redFighterName: gameState.redFighterName,
                            blueFighterName: gameState.blueFighterName,
                            redScore: gameState.redScore,
                            blueScore: gameState.blueScore,
                            redRounds: gameState.redRoundsWon,
                            blueRounds: gameState.blueRoundsWon,
                            currentRound: gameState.currentRound,
                            timerRemaining: gameState.timerRemaining,
                            timerActive: gameState.timerActive,
                            wallersteinMode: gameState.wallersteinMode
                        }
                    }, '*');
                } catch (e) {
                    console.log('Ошибка отправки данных в экран счета:', e);
                    gameState.displayWindow = null;
                    gameState.displayScreenEnabled = false;
                }
            }
        }

        // Функции управления счетом
        function addScore(fighter) {
            if (fighter === 'red') {
                gameState.redScore++;
            } else {
                gameState.blueScore++;
            }
            updateDisplay();
        }

        function removeScore(fighter) {
            if (fighter === 'red') {
                gameState.redScore = Math.max(0, gameState.redScore - 1);
            } else {
                gameState.blueScore = Math.max(0, gameState.blueScore - 1);
            }
            updateDisplay();
        }

        // Новая функция - снятие раунда
        function removeRound(fighter) {
            if (!gameState.wallersteinMode) {
                alert('Снятие раундов доступно только в режиме Валлерштайн');
                return;
            }

            if (fighter === 'red' && gameState.redRoundsWon > 0) {
                gameState.redRoundsWon--;
                if (gameState.currentRound > 1) {
                    gameState.currentRound--;
                }
            } else if (fighter === 'blue' && gameState.blueRoundsWon > 0) {
                gameState.blueRoundsWon--;
                if (gameState.currentRound > 1) {
                    gameState.currentRound--;
                }
            }
            updateDisplay();
        }

        // Функции управления таймером
        function toggleTimer() {
            if (gameState.timerActive) {
                gameState.timerActive = false;
            } else {
                if (gameState.timerRemaining === 0) {
                    gameState.timerRemaining = gameState.timerDuration;
                }
                gameState.timerActive = true;
                gameState.timerStartTime = Date.now() - (gameState.timerDuration - gameState.timerRemaining) * 1000;
            }
            updateDisplay();
        }

        function resetTimer() {
            gameState.timerRemaining = gameState.timerDuration;
            gameState.timerActive = false;
            updateDisplay();
        }

        function updateTimer() {
        if (gameState.timerActive) {
            var elapsed = Math.floor((Date.now() - gameState.timerStartTime) / 1000);
            gameState.timerRemaining = Math.max(0, gameState.timerDuration - elapsed);

            if (gameState.timerRemaining === 0) {
            // Время вышло: останавливаем таймер и показываем плашку
            gameState.timerActive = false;
            gameState.timerRemaining = 0;
            updateDisplay();
            showTimeUpOverlay();
            return;
            }

            updateDisplay();
        }
        function showTimeUpOverlay() {
        var overlay = document.getElementById('timeUpOverlay');
        if (overlay) {
            overlay.style.display = 'flex';
    }
    }
        function hideTimeUpOverlay() {
        var overlay = document.getElementById('timeUpOverlay');
        if (overlay) {
            overlay.style.display = 'none';
        }
        }

        // Завершить бой по кнопке на плашке
        function finishFightAfterTime() {
        hideTimeUpOverlay();

        // Сохраняем бой с текущими данными, не обнуляя раунд и счет
        saveResults();

        // Если хочешь сразу полностью сбрасывать всё после этого – раскомментируй:
        // fullReset();
        }
        }

        // Функции управления раундами
        function endRound() {
            var roundResult = {
                round: gameState.currentRound,
                redScore: gameState.redScore,
                blueScore: gameState.blueScore,
                winner: gameState.redScore > gameState.blueScore ? 'red' : 
                        gameState.blueScore > gameState.redScore ? 'blue' : 'draw'
            };

            gameState.fightHistory.push(roundResult);

            if (gameState.wallersteinMode) {
                if (gameState.redScore > gameState.blueScore) {
                    gameState.redRoundsWon++;
                } else if (gameState.blueScore > gameState.redScore) {
                    gameState.blueRoundsWon++;
                }
            }

            gameState.currentRound++;
            gameState.redScore = 0;
            gameState.blueScore = 0;
            resetTimer();
            updateDisplay();
        }

        function switchSides() {
            gameState.sidesSwitched = !gameState.sidesSwitched;
            // Меняем местами выигранные раунды
            var temp = gameState.redRoundsWon;
            gameState.redRoundsWon = gameState.blueRoundsWon;
            gameState.blueRoundsWon = temp;
            updateDisplay();
        }

        function fullReset() {
            if (confirm('Вы уверены, что хотите выполнить полный сброс?')) {
                gameState.redScore = 0;
                gameState.blueScore = 0;
                gameState.redRoundsWon = 0;
                gameState.blueRoundsWon = 0;
                gameState.currentRound = 1;
                gameState.timerRemaining = gameState.timerDuration;
                gameState.timerActive = false;
                gameState.sidesSwitched = false;
                gameState.fightHistory = [];
                updateDisplay();
            }
        }

        // Функция сохранения результатов боя
        function saveResults() {
            var fightResult = {
                date: new Date().toLocaleString('ru-RU'),
                redFighter: gameState.redFighterName,
                blueFighter: gameState.blueFighterName,
                redFinalScore: gameState.redScore,
                blueFinalScore: gameState.blueScore,
                redRoundsWon: gameState.redRoundsWon,
                blueRoundsWon: gameState.blueRoundsWon,
                currentRound: gameState.currentRound,
                wallersteinMode: gameState.wallersteinMode,
                roundHistory: gameState.fightHistory.slice(),
                winner: gameState.wallersteinMode ? 
                    (gameState.redRoundsWon > gameState.blueRoundsWon ? gameState.redFighterName :
                     gameState.blueRoundsWon > gameState.redRoundsWon ? gameState.blueFighterName : 'Ничья') :
                    (gameState.redScore > gameState.blueScore ? gameState.redFighterName :
                     gameState.blueScore > gameState.redScore ? gameState.blueFighterName : 'Ничья')
            };

            allFights.push(fightResult);
            localStorage.setItem('tournamentResults', JSON.stringify(allFights));

            alert('Результаты боя сохранены! Всего боев в базе: ' + allFights.length);
        }

        // Функция скачивания результатов
        function downloadResults() {
            if (allFights.length === 0) {
                alert('Нет сохраненных результатов для скачивания');
                return;
            }

            var content = 'РЕЗУЛЬТАТЫ ТУРНИРА\n';
            content += '=====================\n\n';

            for (var i = 0; i < allFights.length; i++) {
                var fight = allFights[i];
                content += 'БОЙ #' + (i + 1) + '\n';
                content += 'Дата: ' + fight.date + '\n';
                content += 'Бойцы: ' + fight.redFighter + ' VS ' + fight.blueFighter + '\n';

                if (fight.wallersteinMode) {
                    content += 'Режим: Валлерштайн (по раундам)\n';
                    content += 'Раунды: ' + fight.redFighter + ' ' + fight.redRoundsWon + ' - ' + fight.blueRoundsWon + ' ' + fight.blueFighter + '\n';
                } else {
                    content += 'Режим: По очкам\n';
                    content += 'Счет: ' + fight.redFighter + ' ' + fight.redFinalScore + ' - ' + fight.blueFinalScore + ' ' + fight.blueFighter + '\n';
                }

                content += 'Победитель: ' + fight.winner + '\n';

                if (fight.roundHistory && fight.roundHistory.length > 0) {
                    content += 'История раундов:\n';
                    for (var j = 0; j < fight.roundHistory.length; j++) {
                        var round = fight.roundHistory[j];
                        content += '  Раунд ' + round.round + ': ' + round.redScore + ' - ' + round.blueScore + 
                                  ' (Победитель: ' + (round.winner === 'red' ? fight.redFighter : 
                                                     round.winner === 'blue' ? fight.blueFighter : 'Ничья') + ')\n';
                    }
                }

                content += '\n' + '-'.repeat(50) + '\n\n';
            }

            var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'tournament_results_' + new Date().toISOString().split('T')[0] + '.txt';
            link.click();
        }

        // Функции настроек
        function openSettings() {
            document.getElementById('redFighterInput').value = gameState.redFighterName;
            document.getElementById('blueFighterInput').value = gameState.blueFighterName;
            document.getElementById('timerDurationInput').value = gameState.timerDuration;

            updateSettingsToggles();
            document.getElementById('settingsOverlay').style.display = 'flex';
        }

        function closeSettings(save) {
            if (save) {
                gameState.redFighterName = document.getElementById('redFighterInput').value || 'Красный боец';
                gameState.blueFighterName = document.getElementById('blueFighterInput').value || 'Синий боец';

                var newDuration = parseInt(document.getElementById('timerDurationInput').value) || 120;
                gameState.timerDuration = Math.max(5, Math.min(newDuration, 300));
                gameState.timerRemaining = gameState.timerDuration;
            }

            document.getElementById('settingsOverlay').style.display = 'none';
            updateDisplay();
        }

        function updateSettingsToggles() {
            var wallersteinToggle = document.getElementById('wallersteinToggle');
            wallersteinToggle.textContent = gameState.wallersteinMode ? 'ВКЛ' : 'ВЫКЛ';
            if (gameState.wallersteinMode) {
                wallersteinToggle.classList.add('active');
            } else {
                wallersteinToggle.classList.remove('active');
            }

            var tournamentToggle = document.getElementById('tournamentToggle');
            tournamentToggle.textContent = gameState.tournamentMode ? 'ВКЛ' : 'ВЫКЛ';
            if (gameState.tournamentMode) {
                tournamentToggle.classList.add('active');
            } else {
                tournamentToggle.classList.remove('active');
            }

            var displayToggle = document.getElementById('displayToggle');
            displayToggle.textContent = gameState.displayScreenEnabled ? 'ВКЛ' : 'ВЫКЛ';
            if (gameState.displayScreenEnabled) {
                displayToggle.classList.add('active');
            } else {
                displayToggle.classList.remove('active');
            }
        }

        function toggleWallerstein() {
            gameState.wallersteinMode = !gameState.wallersteinMode;
            updateSettingsToggles();
        }

        function toggleTournament() {
            gameState.tournamentMode = !gameState.tournamentMode;
            updateSettingsToggles();
        }

        function toggleDisplayScreen() {
            gameState.displayScreenEnabled = !gameState.displayScreenEnabled;
            updateSettingsToggles();

            if (gameState.displayScreenEnabled) {
                createDisplayScreen();
            } else {
                closeDisplayScreen();
            }
        }

        // Функция создания экрана со счетом
        function createDisplayScreen() {
            try {
                gameState.displayWindow = window.open('display_screen.html', 'DisplayScreen', 'width=1200,height=800');

                if (!gameState.displayWindow) {
                    alert('Не удалось открыть экран со счетом. Возможно, браузер заблокировал всплывающие окна.');
                    gameState.displayScreenEnabled = false;
                    updateSettingsToggles();
                    return;
                }

                // Проверяем, что окно успешно создано
                setTimeout(function() {
                    if (gameState.displayWindow.closed) {
                        gameState.displayScreenEnabled = false;
                        updateSettingsToggles();
                    } else {
                        console.log('Экран со счетом успешно открыт');
                    }
                }, 1000);

            } catch (e) {
                console.log('Ошибка создания экрана со счетом:', e);
                alert('Ошибка создания экрана со счетом: ' + e.message);
                gameState.displayScreenEnabled = false;
                updateSettingsToggles();
            }
        }

        function closeDisplayScreen() {
            if (gameState.displayWindow && !gameState.displayWindow.closed) {
                gameState.displayWindow.close();
            }
            gameState.displayWindow = null;
            gameState.displayScreenEnabled = false;
        }

        // Дополнительные функции
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        }

        function openHelp() {
            alert('ТЕРМИНАЛ СЕКРЕТАРЯ - СПРАВКА\n\nКнопки управления счетом:\n• +1/-1 балл красному/синему - изменение счета\n\nКнопки управления раундами:\n• Завершить раунд - окончание текущего раунда\n• -1 раунд красному/синему - снятие выигранного раунда (новое!)\n\nКнопки управления таймером:\n• Старт/Пауза - запуск/остановка таймера\n• Сброс таймера - сброс времени\n\nДополнительные функции:\n• Переключить стороны - смена сторон местами\n• Сохранить результаты - сохранение боя в базу (новое!)\n• Скачать результаты - скачать все результаты в файл (новое!)\n• Настройки - изменение параметров боя\n• Полный сброс - сброс всех данных\n• На весь экран - полноэкранный режим\n• Справка - эта подсказка\n\nЭКРАН СО СЧЕТОМ:\n• Включается в настройках\n• Открывает отдельную HTML страницу display_screen.html\n• Красный боец отображается справа\n• F - полноэкранный режим на экране со счетом\n• Синхронизируется с терминалом секретаря в реальном времени');
        }

        // Инициализация и главный цикл
        function init() {
            // Загружаем сохраненные результаты
            allFights = JSON.parse(localStorage.getItem('tournamentResults') || '[]');
            console.log('Загружено боев из истории:', allFights.length);

            updateDisplay();

            // Запуск таймера обновления
            setInterval(updateTimer, 1000);

            // Обработка закрытия окна
            window.addEventListener('beforeunload', function() {
                closeDisplayScreen();
            });

            // Обработка клавиатуры
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    if (document.getElementById('settingsOverlay').style.display === 'flex') {
                        closeSettings(false);
                    }
                }
            });
        }

        // Запуск приложения
        init();
    </script>
<!-- Плашка "Время вышло" -->
<div id="timeUpOverlay">
  <div class="timeup-banner">
    <div class="timeup-title">ВРЕМЯ ВЫШЛО</div>
    <button class="timeup-button" onclick="finishFightAfterTime()">Завершить бой</button>
  </div>
</div>
</body>
